{{define "register.html"}}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - MYIndexCards</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">🃏 <span style="background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">MYIndexCards</span></h1>
            <p class="auth-subtitle">Erstelle ein neues Konto</p>

            {{if .Error}}
            <div class="alert alert-error">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/register">
                <div class="form-group">
                    <label class="form-label" for="username">Benutzername</label>
                    <input class="form-input" type="text" id="username" name="username" required minlength="3" autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Passwort</label>
                    <input class="form-input" type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password_confirm">Passwort bestätigen</label>
                    <input class="form-input" type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password">
                </div>
                <button class="btn btn-primary btn-full" type="submit">Registrieren</button>
            </form>

            <p class="auth-footer">
                Bereits ein Konto? <a href="/login">Zum Login</a>
            </p>
        </div>
    </div>
</body>
</html>
{{end}}
