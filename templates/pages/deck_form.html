{{define "deck_form.html"}}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .IsEdit}}Stapel bearbeiten{{else}}Neuer Stapel{{end}} - MYIndexCards</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">🃏 <span>MYIndexCards</span></a>
            <div class="navbar-links">
                <span class="navbar-user">{{.User.Username}}</span>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">{{if .IsEdit}}Stapel bearbeiten{{else}}Neuer Stapel{{end}}</h1>
            <a href="{{if .IsEdit}}/deck/{{.Deck.ID}}{{else}}/{{end}}" class="btn btn-secondary">← Zurück</a>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        <div class="auth-box" style="max-width: 500px;">
            <form method="POST" action="{{if .IsEdit}}/deck/edit/{{.Deck.ID}}{{else}}/deck/create{{end}}">
                <div class="form-group">
                    <label class="form-label" for="name">Stapelname</label>
                    <input class="form-input" type="text" id="name" name="name" required
                           value="{{if .IsEdit}}{{.Deck.Name}}{{end}}"
                           placeholder="z.B. Biologie, Geschichte...">
                </div>
                <div class="form-group">
                    <label class="form-label" for="color">Farbe</label>
                    <input class="form-input" type="color" id="color" name="color"
                           value="{{if .IsEdit}}{{.Deck.Color}}{{else}}#6c5ce7{{end}}">
                </div>
                <button class="btn btn-primary btn-full" type="submit">
                    {{if .IsEdit}}Speichern{{else}}Erstellen{{end}}
                </button>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
