services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: indexcards
      POSTGRES_PASSWORD: indexcards
      POSTGRES_DB: indexcards
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexcards"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://indexcards:indexcards@db:5432/indexcards?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
